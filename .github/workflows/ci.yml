name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check
        run: python -m py_compile doc_handler.py
      - name: Import check
        run: python -c "import doc_handler; assert hasattr(doc_handler,'main')"
      - name: Install (with deps)
        run: pip install .
